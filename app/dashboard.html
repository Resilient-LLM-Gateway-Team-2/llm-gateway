<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resilient LLM Gateway</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --border-color: #333;
            --text-main: #e0e0e0;
            --text-muted: #999;
            --accent: #bb86fc;
            --user-msg: #3700b3;
            --bot-msg: #2d2d2d;
            --success: #03dac6;
            --error: #cf6679;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
        }

        .chat-header {
            padding: 20px;
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: var(--success);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--success);
        }

        .api-key-input {
            background: #2c2c2c;
            border: 1px solid #444;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            width: 250px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .api-key-input:focus {
            border-color: var(--accent);
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-msg);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot-message {
            align-self: flex-start;
            background-color: var(--bot-msg);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 20px;
            background-color: var(--panel-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            background-color: #2c2c2c;
            border: 1px solid #444;
            color: white;
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            resize: none;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            border-color: var(--accent);
        }

        .send-btn {
            background-color: var(--accent);
            color: #000;
            border: none;
            padding: 0 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .send-btn:hover {
            opacity: 0.9;
        }
        
        .send-btn:active {
            transform: scale(0.98);
        }
        
        .send-btn:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
            transform: none;
        }

        .observability-panel {
            width: 350px;
            background-color: var(--panel-bg);
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .panel-header h2 {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .metrics-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .metric-card {
            background-color: #252525;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .metric-card:hover {
            border-color: #555;
        }

        .metric-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .metric-value {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .provider-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .provider-openai { background: rgba(16, 163, 127, 0.2); color: #10a37f; border: 1px solid #10a37f; }
        .provider-gemini { background: rgba(26, 115, 232, 0.2); color: #8ab4f8; border: 1px solid #8ab4f8; }
        .provider-mock { background: rgba(207, 102, 121, 0.2); color: #cf6679; border: 1px solid #cf6679; }
        .provider-redis_cache { background: rgba(3, 218, 198, 0.2); color: #03dac6; border: 1px solid #03dac6; }

        .latency-fast { color: var(--success); }
        .latency-slow { color: var(--error); }

        .loading {
            display: none;
            align-self: flex-start;
            padding: 12px 16px;
        }

        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--text-muted);
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body>

    <div class="chat-container">
        <header class="chat-header">
            <h1><span class="status-dot"></span> Gateway Chat Demo</h1>
            <input type="password" id="apiKey" class="api-key-input" placeholder="Enter X-API-Key (e.g. test_key)" value="test_key">
        </header>

        <div class="messages" id="chatBox">
            <div class="message bot-message">
                Welcome to the Resilient LLM Gateway Demo. Type a message below to test the routing and failover logic!
            </div>
        </div>

        <div class="loading" id="loadingIndicator">
            <div class="message bot-message">
                <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" class="chat-input" placeholder="Send a message..." autocomplete="off" onkeypress="handleKeyPress(event)">
            <button id="sendBtn" class="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <aside class="observability-panel">
        <div class="panel-header">
            <h2>Observability Metrics</h2>
        </div>
        <div class="metrics-container" id="metricsContainer">
            <div class="metric-card" style="opacity: 0.5; align-items: center; justify-content: center; height: 100%;">
                <p style="color: var(--text-muted); font-size: 0.9rem; text-align: center;">Send a message to view live gateway metrics.</p>
            </div>
        </div>
    </aside>

    <script>
        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');
        const apiKeyInput = document.getElementById('apiKey');
        const sendBtn = document.getElementById('sendBtn');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const metricsContainer = document.getElementById('metricsContainer');

        let chatHistory = [];

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}-message`;
            div.textContent = content;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function updateMetrics(provider, latency, tokens, error = null) {
            const providerName = provider ? provider.toLowerCase() : 'unknown';
            let badgeClass = 'provider-badge ';
            if(providerName.includes('openai')) badgeClass += 'provider-openai';
            else if(providerName.includes('gemini')) badgeClass += 'provider-gemini';
            else if(providerName.includes('mock')) badgeClass += 'provider-mock';
            else if(providerName.includes('redis')) badgeClass += 'provider-redis_cache';
            else badgeClass += 'provider-mock';

            const latencyClass = latency > 2000 ? 'latency-slow' : 'latency-fast';
            
            let html = '';
            
            if (error) {
                html = `
                    <div class="metric-card" style="border-color: var(--error);">
                        <span class="metric-label">Status</span>
                        <span class="metric-value" style="color: var(--error);">Failed</span>
                        <p style="font-size: 0.85rem; color: #aaa; margin-top: 5px;">${error}</p>
                    </div>
                `;
            } else {
                html = `
                    <div class="metric-card">
                        <span class="metric-label">Resolved Provider</span>
                        <span class="${badgeClass}">${provider}</span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">Roundtrip Latency</span>
                        <span class="metric-value ${latencyClass}">${latency} ms</span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">Token Usage</span>
                        <span class="metric-value">${tokens}</span>
                    </div>
                `;
            }

            metricsContainer.innerHTML = html;
        }

        async function sendMessage() {
            const content = messageInput.value.trim();
            const apiKey = apiKeyInput.value.trim();
            
            if (!content) return;
            if (!apiKey) {
                alert("Please enter your X-API-Key");
                apiKeyInput.focus();
                return;
            }

            // Disable UI
            messageInput.value = '';
            messageInput.disabled = true;
            sendBtn.disabled = true;
            
            // Show User Message & Loading
            appendMessage('user', content);
            chatHistory.push({ role: "user", content: content });
            
            loadingIndicator.style.display = 'block';
            chatBox.scrollTop = chatBox.scrollHeight;

            const startTime = performance.now();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': apiKey
                    },
                    body: JSON.stringify({
                        messages: chatHistory,
                        model: "gpt-3.5-turbo"
                    })
                });

                const endTime = performance.now();
                const latency = Math.round(endTime - startTime);

                const data = await response.json();

                loadingIndicator.style.display = 'none';

                if (!response.ok) {
                    appendMessage('bot', `Error: ${data.detail || 'Unknown server error'}`);
                    updateMetrics(null, latency, 0, data.detail);
                    chatHistory.pop(); // Remove failed message from history
                } else {
                    appendMessage('bot', data.content);
                    chatHistory.push({ role: "assistant", content: data.content });
                    
                    const totalTokens = data.usage ? data.usage.total_tokens : 0;
                    updateMetrics(data.provider, latency, totalTokens);
                }

            } catch (err) {
                loadingIndicator.style.display = 'none';
                appendMessage('bot', `Connection Error: ${err.message}`);
                updateMetrics(null, 0, 0, err.message);
                chatHistory.pop();
            }

            // Re-enable UI
            messageInput.disabled = false;
            sendBtn.disabled = false;
            messageInput.focus();
        }
    </script>
</body>
</html>
