services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gatewaypass
      POSTGRES_DB: gatewaydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://gateway:gatewaypass@postgres:5432/gatewaydb
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      - postgres
      - redis

volumes:
  pgdata: